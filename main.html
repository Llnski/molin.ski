<!DOCTYPE html>
<html>
<head>
    <title>My dogshit website</title>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #000000;
            background-image: url('https://anlucas.neocities.org/bg/stars.gif'); /* Classic starfield */
            color: #00FF00;
            font-family: "MS Sans Serif", "Courier New", monospace;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            border: 4px ridge #00FF00;
            padding: 20px;
            box-shadow: 10px 10px 0px #800080;
        }
        
        h1, h2 {
            text-align: center;
            color: #FFFF00;
            font-family: "Comic Sans MS", cursive;
            text-shadow: 2px 2px #FF0000;
        }

        .marquee-container {
            border: 2px dashed #FF00FF;
            padding: 5px;
            margin-bottom: 20px;
            background: #000080;
        }

        a {
            color: #00FFFF;
            text-decoration: none;
            font-weight: bold;
        }
        
        a:hover {
            color: #FF00FF;
            text-decoration: underline overline;
            background: #FFFFFF;
        }

        .buttons {
            text-align: center;
            margin-top: 30px;
        }

        .buttons img {
            image-rendering: pixelated;
            margin: 2px;
            border: 1px solid #555;
        }

        hr {
            border: 0;
            border-bottom: 2px dashed #00FF00;
            margin: 25px 0;
        }

        .construction {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="marquee-container">
            <marquee scrollamount="6" behavior="alternate" style="font-size: 1.2em; color: #00FFFF;">
                ***C'est 马康纳 site web.***
